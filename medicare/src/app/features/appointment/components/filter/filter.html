<form [formGroup]="form"
  class="bg-white rounded-2xl border border-slate-200/60 p-5 mb-6 shadow-sm animate-[fadeIn_0.2s_ease-out]">

  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 items-end">

    <div class="flex flex-col gap-1.5">
      <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider pl-1">
        Ngày hẹn
      </label>
      <input type="date" formControlName="date"
        class="w-full border border-slate-200 rounded-xl px-3.5 py-2 text-sm text-slate-700 bg-slate-50/50 focus:bg-white focus:ring-2 focus:ring-blue-600/10 focus:border-blue-600 outline-none transition-all cursor-pointer">
    </div>

    <div class="flex flex-col gap-1.5">
      <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider pl-1">
        Trạng thái
      </label>
      <select formControlName="status"
        class="w-full border border-slate-200 rounded-xl px-3.5 py-2 text-sm text-slate-700 bg-slate-50/50 focus:bg-white focus:ring-2 focus:ring-blue-600/10 focus:border-blue-600 outline-none transition-all cursor-pointer">
        <option value="all">Tất cả trạng thái</option>
        @for(status of statuses; track status) {
        <option [value]="status">{{ getStatusInfo(status).text }}</option>
        }
      </select>
    </div>

    <div class="flex flex-col gap-1.5">
      <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider pl-1">
        Thứ tự hiển thị
      </label>
      <select formControlName="sortOrder"
        class="w-full border border-slate-200 rounded-xl px-3.5 py-2 text-sm text-slate-700 bg-slate-50/50 focus:bg-white focus:ring-2 focus:ring-blue-600/10 focus:border-blue-600 outline-none transition-all cursor-pointer">
        <option value="desc">Mới nhất</option>
        <option value="asc">Cũ nhất</option>
      </select>
    </div>

    <div class="flex gap-2">

      <button type="button" (click)="resetFilters()"
        class="flex-1 h-[38px] px-4 border border-slate-200 text-slate-600 rounded-xl text-xs font-bold hover:bg-slate-50 active:bg-slate-100 transition-colors flex items-center justify-center gap-1">
        <span class="material-symbols-outlined text-[16px]">restart_alt</span>
      </button>

      <button type="button" (click)="applyFilters()"
        class="flex-1 h-[38px] px-4 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-xs font-bold shadow-sm shadow-blue-600/10 transition-all flex items-center justify-center gap-1">
        <span class="material-symbols-outlined text-[16px]">filter_list</span>
      </button>

    </div>

  </div>
</form>
