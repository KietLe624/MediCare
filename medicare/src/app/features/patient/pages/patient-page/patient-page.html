<div class="p-8 space-y-8">
  <!-- Header Actions -->
  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <div class="lg:col-span-2 space-y-2">
      <h1 class="text-3xl font-extrabold text-on-surface tracking-tight">
        Patient Registry
      </h1>
      <p class="text-on-surface-variant max-w-2xl font-body">
        Manage central patient admission records, diagnostic histories, and
        department assignments across the hospital network.
      </p>
    </div>
    <div class="flex items-center lg:justify-end gap-3">
      <button
        class="px-5 py-2.5 rounded-xl bg-surface-container-highest text-on-surface font-semibold text-sm hover:translate-y-[-1px] active:scale-95 transition-all flex items-center gap-2">
        <span class="material-symbols-outlined text-lg">download</span> Export
        Data
      </button>
      <button (click)="openCreate()"
        class="px-6 py-2.5 rounded-xl bg-gradient-to-br from-primary to-primary-container text-white font-bold text-sm shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-100 transition-all flex items-center gap-2">
        <span class="material-symbols-outlined text-lg">person_add</span> Add
        Patient
      </button>
    </div>
  </div>
  <!-- Filters -->
  <div class="w-full">
    <app-filter (filterChanged)="onFilterChanged($event)"></app-filter>
  </div>
  <!-- Patient Table -->
  <app-patient-table [patients]="patients" (edit)="openEdit($event)" (visitHistory)="openHistory($event)">
  </app-patient-table>

  <app-create-patient *ngIf="showCreateModal" (saved)="loadPatients()" (closed)="onCreateClosed()">
  </app-create-patient>

  <app-edit-patient *ngIf="showEditModal" [patientId]="selectedPatientId!" (saved)="loadPatients()"
    (closed)="onEditClosed()">
  </app-edit-patient>

  <app-drawer-visit [isOpen]="isDrawerOpen" [id]="selectedPatientId!" (close)="isDrawerOpen = false">
  </app-drawer-visit>

</div>
