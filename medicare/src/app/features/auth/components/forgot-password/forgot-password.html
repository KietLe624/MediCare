<main class="min-h-screen flex items-center justify-center px-4 py-10">
	<div class="w-full max-w-md bg-white rounded-2xl shadow-2xl shadow-blue-900/5 border border-slate-100 p-8">
		<div class="mb-6">
			<h2 class="font-headline text-2xl font-bold text-slate-900">Quên mật khẩu</h2>
			<p class="text-slate-500 text-sm mt-1">Nhập email để nhận liên kết đặt lại mật khẩu.</p>
		</div>

		<form class="space-y-4" (ngSubmit)="onSubmit()">
			<div>
				<label class="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1.5" for="email">
					Email
				</label>
				<div class="relative group">
					<span
						class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-brand-blue transition-colors text-lg">
						Mail
					</span>
					<input type="email" id="email" name="email" [(ngModel)]="form.email" required
						class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200 rounded-medical focus:ring-2 focus:ring-brand-blue/20 focus:border-brand-blue outline-none transition-all text-sm"
						placeholder="Email">
				</div>
			</div>

			<p *ngIf="errorMessage" class="text-xs text-red-600 font-medium">{{ errorMessage }}</p>
			<p *ngIf="successMessage" class="text-xs text-green-700 font-medium">{{ successMessage }}</p>

			<button type="submit" [disabled]="isSubmitting"
				class="w-full bg-brand-blue hover:bg-blue-700 text-white font-bold py-3.5 rounded-medical shadow-lg shadow-blue-500/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2 text-sm">
				<span *ngIf="!isSubmitting">Gửi yêu cầu</span>
				<span *ngIf="isSubmitting">Đang xử lý...</span>
			</button>

			<div class="text-center">
				<a routerLink="/" class="text-[11px] font-semibold text-brand-blue hover:underline">Quay lại đăng nhập</a>
			</div>
		</form>
	</div>
</main>
