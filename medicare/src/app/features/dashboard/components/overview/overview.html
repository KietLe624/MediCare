<section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
  <div *ngFor="let stat of stats" class="glass-card rounded-2xl p-4 light-leak-shadow">
    <div class="flex justify-between items-start mb-4">
      <div class="w-12 h-12 rounded-2xl flex items-center justify-center" [ngClass]="{
            'bg-primary/10 text-primary': stat.icon === 'patients' || stat.icon === 'visits',
            'bg-secondary-container/30 text-secondary': stat.icon === 'doctors',
            'bg-tertiary-container/10 text-tertiary': stat.icon === 'appointments'
          }">
        <span class="material-symbols-outlined">
          {{
          stat.icon === 'patients'
          ? 'group'
          : stat.icon === 'doctors'
          ? 'stethoscope'
          : stat.icon === 'appointments'
          ? 'calendar_month'
          : 'monitoring'
          }}
        </span>
      </div>
      <span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">
        {{ stat.chip }}
      </span>
    </div>
    <p class="text-on-surface-variant font-label-md uppercase tracking-wider mb-1">{{ stat.title }}</p>
    <h3 class="text-headline-md font-bold text-on-surface">{{ stat.value }}</h3>
    <p class="text-[11px] text-on-surface-variant mt-2">{{ stat.note }}</p>
  </div>
</section>
